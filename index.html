<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OC Recycling System</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --text: #e0e0e0;
      --muted: #a8a8a8;
      --pink-primary: #ffbcb5;
      --yellow-primary: #eed495;
      --danger: #d46a6a;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 10px;
      --font-body: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading: Georgia, "Times New Roman", serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 188, 181, 0.08), transparent 32%),
        radial-gradient(circle at top right, rgba(241, 206, 102, 0.08), transparent 28%),
        linear-gradient(180deg, #171717 0%, #1a1a1a 100%);
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    .app-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); min-height: 100vh; }
    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      padding: 24px 20px;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(255, 188, 181, 0.1), transparent 28%), rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(12px);
    }
    .brand, .card, .stat-card, .table-card, .character-card, .status-column, .profile-panel, .connection-card {
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)), #242424;
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: var(--shadow);
    }
    .brand { margin-bottom: 28px; padding: 18px; }
    .brand h1, .view-title { margin: 0; font-family: var(--font-heading); letter-spacing: 0.02em; }
    .brand p, .helper-text, .empty-state, .notice, .footer-note, .sidebar-panel p, .view-header p { color: var(--muted); line-height: 1.6; }
    .nav-list, .manage-list { display: grid; gap: 10px; }
    .nav-link, .button, .ghost-button, .danger-button, .small-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      transition: transform 150ms ease, border-color 150ms ease, background-color 150ms ease;
    }
    .nav-link {
      justify-content: space-between;
      padding: 12px 14px;
      border: 1px solid transparent;
    }
    .nav-link:hover, .nav-link.active, .manage-item:hover, .manage-item.active { background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.12); }
    .sidebar-panel, .card, .table-card, .profile-panel, .status-column { padding: 20px; }
    .sidebar-panel { border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
    .sidebar-panel h2, .section-heading, .card-title { margin: 0 0 10px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--yellow-primary); }
    .content { padding: 28px; }
    .view-header, .card-header, .table-header, .form-header, .status-header, .button-row, .profile-summary, .name-row, .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .view-header, .card-header, .table-header, .form-header, .status-header { justify-content: space-between; margin-bottom: 18px; }
    .status-pill, .tag, .status-badge, .group-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.82rem;
    }
    .status-badge.on { color: #101010; background: var(--accent, var(--yellow-primary)); border-color: transparent; font-weight: 700; }
    .stats-grid, .dashboard-grid, .profile-grid, .manage-layout, .tracker-grid, .relationship-grid, .filters-grid, .form-grid, .appearance-grid, .detail-grid, .character-grid, .connection-list, .mini-grid, .tag-cloud {
      display: grid;
      gap: 18px;
    }
    .stats-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .dashboard-grid { grid-template-columns: 1.6fr 1fr; }
    .profile-grid { grid-template-columns: 1.2fr 0.8fr; }
    .manage-layout { grid-template-columns: 320px minmax(0, 1fr); }
    .tracker-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .relationship-grid { grid-template-columns: minmax(260px, 320px) minmax(0, 1fr); }
    .filters-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .appearance-grid, .detail-grid, .mini-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    .character-grid, .connection-list { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .tag-cloud { grid-template-columns: repeat(auto-fit, minmax(100px, max-content)); gap: 10px; }
    .stat-card, .character-card, .connection-card { position: relative; overflow: hidden; padding: 18px 18px 18px 22px; }
    .stat-card::before, .character-card::before, .profile-panel::before, .connection-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--accent, var(--pink-primary));
    }
    .stat-card .value { margin: 20px 0 8px; font-size: 2.2rem; font-weight: 700; }
    .meta-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.78rem; }
    .field, .search-field { display: grid; gap: 8px; }
    .field label, .search-field label { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .field input, .field select, .field textarea, .search-field input, .search-field select {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      outline: none;
    }
    .field textarea { min-height: 120px; resize: vertical; }
    .field-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.02);
    }
    .field-checkbox label { margin: 0; color: var(--text); font-size: 0.92rem; text-transform: none; letter-spacing: 0; }
    .button, .ghost-button, .danger-button, .small-button { padding: 12px 16px; border: 1px solid transparent; cursor: pointer; }
    .button:hover, .ghost-button:hover, .danger-button:hover, .small-button:hover { transform: translateY(-1px); }
    .button { background: linear-gradient(135deg, var(--pink-primary), var(--yellow-primary)); color: #1f1f1f; font-weight: 700; }
    .ghost-button, .small-button { background: rgba(255, 255, 255, 0.03); border-color: rgba(255, 255, 255, 0.08); color: var(--text); }
    .danger-button { background: rgba(212, 106, 106, 0.14); border-color: rgba(212, 106, 106, 0.35); color: #ffdede; }
    .small-button { padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; }
    .table-wrap { overflow: auto; border-radius: var(--radius-md); border: 1px solid rgba(255, 255, 255, 0.05); }
    table { width: 100%; border-collapse: collapse; min-width: 860px; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    th { position: sticky; top: 0; background: #262626; z-index: 1; color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.02); }
    .swatch { width: 14px; height: 14px; border-radius: 999px; box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.06); }
    .notice { padding: 14px 16px; border-radius: var(--radius-md); background: rgba(255, 255, 255, 0.03); border: 1px dashed rgba(255, 255, 255, 0.12); }
    .profile-hero { padding: 24px; border-radius: var(--radius-lg); background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 62%), #242424; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: var(--shadow); }
    .profile-hero h2 { margin: 10px 0 0; font-family: var(--font-heading); font-size: clamp(2rem, 3vw, 2.8rem); }
    .relationship-map { display: grid; place-items: center; min-height: 360px; border-radius: var(--radius-lg); border: 1px solid rgba(255, 255, 255, 0.06); background: radial-gradient(circle at center, rgba(255, 255, 255, 0.04), transparent 54%), rgba(255, 255, 255, 0.02); overflow: hidden; }
    .relationship-map svg { width: 100%; min-height: 360px; }
    .relationship-map text { fill: var(--text); font-size: 12px; font-family: var(--font-body); }
    .manage-list { max-height: 720px; overflow: auto; }
    .manage-item { padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.06); background: rgba(255, 255, 255, 0.03); cursor: pointer; }
    @media (max-width: 1100px) {
      .app-shell, .dashboard-grid, .profile-grid, .manage-layout, .tracker-grid, .relationship-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
    }
    @media (max-width: 760px) {
      .content { padding: 18px; }
      .sidebar { padding: 18px; }
      .view-header { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>OC Recycling System</h1>
        <p>A local-first archive for color-coded characters, relationships, and progress tracking.</p>
      </div>
      <nav class="nav-list" id="sidebar-nav" aria-label="Main navigation"></nav>
      <div class="sidebar-panel">
        <h2>Archive Notes</h2>
        <p>Everything lives in your browser via localStorage. Export JSON regularly if you want a clean backup snapshot.</p>
      </div>
    </aside>
    <main class="content" id="app"></main>
  </div>

  <script type="module">
    // data.js - storage and seed data
    const STORAGE_KEY = "oc-recycling-system.characters.v1";
    const RELATIONSHIP_LIMIT = 4;
    const seedCharacters = [
      { name: "Maya", pronouns: "she/her", personality: "6w2 ENFP", colorHex: "#cf7f81", colorName: "Dusty Pink", group: 5, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Madeline", pronouns: "she/her", personality: "2w8 ESFJ", colorHex: "#d62828", colorName: "Bright Strong Red", group: 5, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Niall", pronouns: "he/him", personality: "9w2 ESFJ", colorHex: "#6b7c5d", colorName: "Mosswood Green", group: 5, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Deirdre", pronouns: "she/her", personality: "8w4 INFJ", colorHex: "#c8981e", colorName: "Aged Gold", group: 5, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Linda", pronouns: "she/her", personality: "4w6 ISFP", colorHex: "#5f9e6e", colorName: "Muted Emerald", group: 4, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Radcliffe", pronouns: "he/they", personality: "8w1 ISTP", colorHex: "#4b006e", colorName: "Royal Purple", group: 4, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Zee", pronouns: "they/them", personality: "4w8 ISTP", colorHex: "#e0218a", colorName: "Barbie Magenta", group: 4, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Nik", pronouns: "he/him", personality: "2w4 ISFJ", colorHex: "#800020", colorName: "Maroon", group: 4, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Nesto", pronouns: "he/him", personality: "7w2 ESFP", colorHex: "#56633e", colorName: "Olive Green", group: 1, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Daeya", pronouns: "she/they", personality: "5w8 ISTJ", colorHex: "#576880", colorName: "Slate Blue", group: 1, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Aini", pronouns: "she/her", personality: "2w7 ENFJ", colorHex: "#e3f57f", colorName: "Sunny Pear", group: 1, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Shinji", pronouns: "they/them", personality: "9w7 ENFP", colorHex: "#4bd698", colorName: "Minty Teal", group: 1, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Harmony", pronouns: "she/her", personality: "3w2 ESFP", colorHex: "#d1783c", colorName: "Burnt Orange", group: 3, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Tonic", pronouns: "she/they", personality: "4w9 INFP", colorHex: "#605c29", colorName: "Plaid Green", group: 3, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Corey", pronouns: "she/her", personality: "8w3 ESTP", colorHex: "#722f37", colorName: "Wine Red", group: 3, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Elijah", pronouns: "they/them", personality: "7w4 ESFP", colorHex: "#c8a2c8", colorName: "Lilac", group: 3, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Patty", pronouns: "she/they", personality: "6w4 ISFJ", colorHex: "#aba39b", colorName: "Hearthstone Grey", group: 2, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Penny", pronouns: "she/her", personality: "3w6 ESFP", colorHex: "#673f79", colorName: "Plum Royale", group: 2, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Silas", pronouns: "he/him", personality: "4w8 ENTP", colorHex: "#c96f3d", colorName: "Molten Copper", group: 2, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false },
      { name: "Fiona", pronouns: "she/her", personality: "8w4 ENFJ", colorHex: "#7d1e3e", colorName: "Garnet Glare", group: 2, excelStatus: false, discordStatus: false, tumblrStatus: false, ao3Status: false }
    ];
    const relationshipSeeds = [
      ["Nesto", "Daeya"], ["Fiona", "Penny"], ["Harmony", "Tonic"], ["Elijah", "Radcliffe"],
      ["Niall", "Madeline"], ["Maya", "Harmony"], ["Linda", "Radcliffe"], ["Deirdre", "Niall"],
      ["Niall", "Maya"], ["Madeline", "Maya"], ["Aini", "Shinji"], ["Zee", "Nesto"],
      ["Zee", "Daeya"], ["Elijah", "Zee"]
    ];
    const navItems = [
      { hash: "#dashboard", label: "Dashboard", meta: "Home" },
      { hash: "#list", label: "Master List", meta: "Search + filters" },
      { hash: "#relationships", label: "Relationships", meta: "Connections" },
      { hash: "#tracker", label: "Progress Tracker", meta: "Excel / Discord / Tumblr / AO3" },
      { hash: "#manage", label: "Manage Archive", meta: "CRUD + backup" }
    ];
    const appState = {
      characters: loadCharacters(),
      filters: { query: "", mbti: "", enneagram: "", group: "", status: "" },
      selectedManageId: null,
      selectedRelationshipId: null,
      notice: "Seed data loaded. Unknown status fields start as false until you fill them in."
    };
    const appElement = document.getElementById("app");
    const navElement = document.getElementById("sidebar-nav");
    function escapeHtml(value) {
      return String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }
    function parsePersonality(personality) {
      const [enneagram = "", mbti = ""] = String(personality || "").trim().split(/\s+/);
      return { enneagram, mbti };
    }
    function buildPlaceholderText(name, group) {
      return `${name} is archived in Group ${group}. This profile needs a fuller narrative pass, so this note marks where lore, timeline beats, and emotional stakes can be expanded later.`;
    }
    function buildAppearance(name, colorName) {
      return {
        height: "To be decided",
        bodyType: `Placeholder silhouette with ${colorName.toLowerCase()} styling cues`,
        hair: `${name}'s hair details still need a final note`,
        eyes: "Appearance notes pending",
        skin: "Complexion notes pending"
      };
    }
    function createSeedData() {
      const byName = new Map();
      const characters = seedCharacters.map((character, index) => {
        const parsed = parsePersonality(character.personality);
        const record = {
          id: index + 1,
          name: character.name,
          pronouns: character.pronouns,
          personality: character.personality,
          mbti: parsed.mbti,
          enneagram: parsed.enneagram,
          colorHex: character.colorHex,
          colorName: character.colorName,
          group: character.group,
          excelStatus: Boolean(character.excelStatus),
          discordStatus: Boolean(character.discordStatus),
          tumblrStatus: Boolean(character.tumblrStatus),
          ao3Status: Boolean(character.ao3Status),
          backstory: buildPlaceholderText(character.name, character.group),
          appearance: buildAppearance(character.name, character.colorName),
          relationships: []
        };
        byName.set(character.name, record.id);
        return record;
      });
      for (const [fromName, toName] of relationshipSeeds) {
        const fromId = byName.get(fromName);
        const toId = byName.get(toName);
        if (!fromId || !toId) continue;
        const fromCharacter = characters.find((item) => item.id === fromId);
        const toCharacter = characters.find((item) => item.id === toId);
        if (fromCharacter.relationships.length < RELATIONSHIP_LIMIT && !fromCharacter.relationships.includes(toId)) fromCharacter.relationships.push(toId);
        if (toCharacter.relationships.length < RELATIONSHIP_LIMIT && !toCharacter.relationships.includes(fromId)) toCharacter.relationships.push(fromId);
      }
      return characters;
    }
    function normalizeCharacter(rawCharacter, index = 0) {
      const personality = rawCharacter.personality || `${rawCharacter.enneagram || ""} ${rawCharacter.mbti || ""}`.trim();
      const parsed = parsePersonality(personality);
      const appearance = rawCharacter.appearance || {};
      return {
        id: Number(rawCharacter.id) || index + 1,
        name: rawCharacter.name || "Untitled OC",
        pronouns: rawCharacter.pronouns || "unknown",
        personality,
        mbti: rawCharacter.mbti || parsed.mbti,
        enneagram: rawCharacter.enneagram || parsed.enneagram,
        colorHex: rawCharacter.colorHex || "#888888",
        colorName: rawCharacter.colorName || "Unsorted",
        group: Number(rawCharacter.group) || 1,
        excelStatus: Boolean(rawCharacter.excelStatus),
        discordStatus: Boolean(rawCharacter.discordStatus),
        tumblrStatus: Boolean(rawCharacter.tumblrStatus),
        ao3Status: Boolean(rawCharacter.ao3Status),
        backstory: rawCharacter.backstory || "Backstory note pending.",
        appearance: {
          height: appearance.height || "To be decided",
          bodyType: appearance.bodyType || "To be decided",
          hair: appearance.hair || "To be decided",
          eyes: appearance.eyes || "To be decided",
          skin: appearance.skin || "To be decided"
        },
        relationships: Array.isArray(rawCharacter.relationships)
          ? rawCharacter.relationships.map((value) => Number(value)).filter((value, idx, array) => Number.isInteger(value) && value > 0 && array.indexOf(value) === idx).slice(0, RELATIONSHIP_LIMIT)
          : []
      };
    }
    function loadCharacters() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return createSeedData();
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) return createSeedData();
        return parsed.map(normalizeCharacter);
      } catch (error) {
        console.error("Failed to load characters from localStorage.", error);
        return createSeedData();
      }
    }
    function saveCharacters(characters) { localStorage.setItem(STORAGE_KEY, JSON.stringify(characters)); }
    function exportCharacters(characters) {
      const payload = JSON.stringify(characters, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `oc-recycling-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }
    function importCharacters(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "[]"));
            if (!Array.isArray(parsed)) return reject(new Error("The imported JSON must be an array of characters."));
            resolve(parsed.map(normalizeCharacter));
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = () => reject(reader.error || new Error("Unable to read file."));
        reader.readAsText(file);
      });
    }
    // filters.js - search and filter helpers
    function getUniqueValues(characters, key) { return [...new Set(characters.map((character) => character[key]).filter(Boolean))].sort(); }
    function matchesStatusFilter(character, statusFilter) {
      if (!statusFilter) return true;
      const mapping = { excel: character.excelStatus, discord: character.discordStatus, tumblr: character.tumblrStatus, ao3: character.ao3Status };
      return Boolean(mapping[statusFilter]);
    }
    function filterCharacters(characters, filters) {
      const query = filters.query.trim().toLowerCase();
      return characters.filter((character) => {
        const searchableText = [character.name, character.pronouns, character.personality, character.backstory, character.colorName].join(" ").toLowerCase();
        return (!query || searchableText.includes(query)) && (!filters.mbti || character.mbti === filters.mbti) && (!filters.enneagram || character.enneagram === filters.enneagram) && (!filters.group || Number(filters.group) === character.group) && matchesStatusFilter(character, filters.status);
      });
    }
    // relationships.js - connection lookups and visualizer
    function getCharacterById(characters, id) { return characters.find((character) => character.id === Number(id)); }
    function getRelationshipCharacters(characters, character) { return character.relationships.map((id) => getCharacterById(characters, id)).filter(Boolean).slice(0, RELATIONSHIP_LIMIT); }
    function buildRelationshipSvg(character, relatedCharacters) {
      const width = 640;
      const height = 360;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = 118;
      const nodes = relatedCharacters.map((relatedCharacter, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(relatedCharacters.length, 1) - Math.PI / 2;
        return { ...relatedCharacter, x: centerX + Math.cos(angle) * radius, y: centerY + Math.sin(angle) * radius };
      });
      const lines = nodes.map((node) => `<line x1="${centerX}" y1="${centerY}" x2="${node.x}" y2="${node.y}" stroke="${node.colorHex}" stroke-width="3" stroke-linecap="round" opacity="0.75"></line>`).join("");

      appState.filters[target.name] = target.value;
      render();
    }
    async function handleImportFile(input) {
      const file = input.files?.[0];
      if (!file) return;
      try {
        appState.characters = await importCharacters(file);
        persistCharacters();
        setNotice(`Imported ${appState.characters.length} characters from backup JSON.`);
        appState.selectedManageId = appState.characters[0]?.id || null;
        appState.selectedRelationshipId = appState.characters[0]?.id || null;
        render();
      } catch (error) {
        console.error(error);
        window.alert("Import failed. Check that the file contains a valid JSON array of characters.");
      } finally {
        input.value = "";
      }
    }
    function handleFormSubmit(event) {
      event.preventDefault();
      const form = event.currentTarget;
      if (!(form instanceof HTMLFormElement)) return;
      const serialized = serializeForm(form);
      if (!serialized.id) serialized.id = getNextId(appState.characters);
      const errors = validateCharacter(serialized);
      if (errors.length) return window.alert(errors.join("\n"));
      appState.characters = upsertCharacter(appState.characters, serialized);
      persistCharacters();
      appState.selectedManageId = serialized.id;
      appState.selectedRelationshipId = serialized.id;
      setNotice(`${serialized.name} saved to localStorage.`);
      window.location.hash = `#profile/${serialized.id}`;
      render();
    }
    function handleActionClick(target) {
      const actionTarget = target.closest("[data-action]");
      if (!actionTarget) return;
      const action = actionTarget.getAttribute("data-action");
      const id = Number(actionTarget.getAttribute("data-id"));
      if (action === "clear-filters") clearFilters();
      if (action === "new-character") { appState.selectedManageId = null; setNotice("New character form ready."); render(); }
      if (action === "edit-character" && id) { appState.selectedManageId = id; render(); }
      if (action === "export-json") { exportCharacters(appState.characters); setNotice("Backup JSON exported."); render(); }
      if (action === "reset-form") render();
      if (action === "delete-character" && id) {
        const targetCharacter = getCharacterById(appState.characters, id);
        if (!targetCharacter) return;
        if (!window.confirm(`Delete ${targetCharacter.name} from the local archive? This cannot be undone without a backup.`)) return;
        appState.characters = deleteCharacter(appState.characters, id);
        persistCharacters();
        appState.selectedManageId = appState.characters[0]?.id || null;
        appState.selectedRelationshipId = appState.characters[0]?.id || null;
        setNotice(`${targetCharacter.name} deleted from localStorage.`);
        render();
      }
    }
    document.addEventListener("input", handleFilterInput);
    document.addEventListener("change", (event) => {
      const target = event.target;
      if (target instanceof HTMLSelectElement && target.dataset.action === "select-relationship") {
        appState.selectedRelationshipId = Number(target.value);
        render();
      }
      if (target instanceof HTMLInputElement && target.dataset.action === "import-json") handleImportFile(target);
    });
    document.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      const manageLink = target.closest("[data-manage-id]");
      if (manageLink) appState.selectedManageId = Number(manageLink.getAttribute("data-manage-id"));
      handleActionClick(target);
    });
    document.addEventListener("submit", (event) => {
      const target = event.target;
      if (target instanceof HTMLFormElement && target.id === "character-form") handleFormSubmit(event);
    });
    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
